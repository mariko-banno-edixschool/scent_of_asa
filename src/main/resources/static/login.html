<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スタッフログイン | SCENT OF ASA</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-page lang-ja">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index-ja.html">SCENT OF ASA</a>
      <button class="nav-toggle" type="button" aria-label="メニューを開く" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="main-nav" aria-label="Primary navigation">
        <a href="index-ja.html">ホーム</a>
        <a href="about-ja.html">About</a>
        <a href="booking-ja.html">予約</a>
      </nav>
      <div class="header-actions">
        <a class="btn btn-secondary btn-header" href="booking-ja.html">予約ページへ戻る</a>
      </div>
    </div>
  </header>

  <main class="login-shell">
    <section class="login-card">
      <p class="admin-kicker">スタッフ専用</p>
      <h1>スタッフログイン</h1>
      <p class="admin-hero-copy">予約管理、チェックイン、枠調整のための管理画面にアクセスします。</p>
      <form class="admin-form-grid">
        <div class="admin-field">
          <label>メールアドレス</label>
          <input type="email" placeholder="staff@scentofasa.com" />
        </div>
        <div class="admin-field">
          <label>パスワード</label>
          <input type="password" placeholder="••••••••" />
        </div>
        <p class="admin-inline-note">スタッフ用アカウントをご利用ください。操作履歴は記録されます。</p>
        <a class="btn btn-primary btn-full" href="dashboard.html">ログインする</a>
      </form>
    </section>
  </main>
  <script src="nav.js"></script>
</body>
</html>
