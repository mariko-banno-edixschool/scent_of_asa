<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ガイドログイン | SCENT OF ASA</title>
  <link rel="stylesheet" href="../shared/css/admin.css" />
</head>
<body class="admin-page lang-ja">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="/?lang=ja">SCENT OF ASA</a>
      <button class="nav-toggle" type="button" aria-label="メニューを開く" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="main-nav" aria-label="Primary navigation">
        <a href="/?lang=ja">ホーム</a>
        <a href="/about?lang=ja">About</a>
        <a href="/booking?lang=ja">予約</a>
      </nav>
      <div class="header-actions">
        <a class="btn btn-secondary btn-header" href="login.html">スタッフ用</a>
      </div>
    </div>
  </header>

  <main class="login-shell">
    <section class="login-card">
      <p class="admin-kicker">Guide Access</p>
      <h1>ガイドログイン</h1>
      <p class="admin-hero-copy">仮ログインとして、ガイド一覧から本人の ID を選んでスケジュール画面へ入れます。本認証を入れる前の確認用導線です。</p>

      <form id="guide-login-form" class="admin-form-grid">
        <div class="admin-field">
          <label for="guide-login-id">ログインID</label>
          <select id="guide-login-id" required>
            <option value="">ガイドを選択してください</option>
          </select>
        </div>
        <p id="guide-login-feedback" class="admin-inline-note">ガイド一覧を読み込んでいます。</p>
        <button class="btn btn-primary btn-full" type="submit">ガイド画面に入る</button>
      </form>

      <div class="login-alt-links">
        <a class="admin-back-link" href="login.html">スタッフログインへ</a>
        <a class="admin-back-link" href="/?lang=ja">サイトへ戻る</a>
      </div>
    </section>
  </main>
  <script src="../shared/js/nav.js"></script>
  <script src="../shared/js/guide_login.js"></script>
</body>
</html>
