<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ガイドログイン | SCENT OF ASA</title>
  <link rel="stylesheet" href="../shared/css/admin.css" />
</head>
<body class="admin-page lang-ja">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="../public/index-ja.html">SCENT OF ASA</a>
      <button class="nav-toggle" type="button" aria-label="メニューを開く" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="main-nav" aria-label="Primary navigation">
        <a href="../public/index-ja.html">ホーム</a>
        <a href="../public/about-ja.html">About</a>
        <a href="../public/booking-ja.html">予約</a>
      </nav>
      <div class="header-actions">
        <a class="btn btn-secondary btn-header" href="login.html">スタッフ用</a>
      </div>
    </div>
  </header>

  <main class="login-shell">
    <section class="login-card">
      <p class="admin-kicker">Guide Access</p>
      <h1>ガイドログイン</h1>
      <p class="admin-hero-copy">担当ガイドごとにログインし、ご自身の対応可能日、時間帯、受付停止を管理できる想定の画面です。</p>
      <form class="admin-form-grid">
        <div class="admin-field">
          <label>メールアドレス</label>
          <input type="email" placeholder="guide@scentofasa.com" />
        </div>
        <div class="admin-field">
          <label>パスワード</label>
          <input type="password" placeholder="••••••••" />
        </div>
        <p class="admin-inline-note">ログイン後はご自身に割り当てられたカレンダーだけを編集できる想定です。後から Java 側で権限管理をつなげやすい形にしています。</p>
        <a class="btn btn-primary btn-full" href="guide_schedule.html">ガイド画面に入る</a>
      </form>

      <div class="login-alt-links">
        <a class="admin-back-link" href="login.html">スタッフログインへ</a>
        <a class="admin-back-link" href="../public/index-ja.html">サイトへ戻る</a>
      </div>
    </section>
  </main>
  <script src="../shared/js/nav.js"></script>
</body>
</html>
