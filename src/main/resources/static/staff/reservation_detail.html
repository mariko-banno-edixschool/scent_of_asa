<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>予約一覧 | SCENT OF ASA</title>
  <link rel="stylesheet" href="../shared/css/admin.css" />
</head>
<body class="admin-page lang-ja">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="/?lang=ja">SCENT OF ASA</a>
      <button class="nav-toggle" type="button" aria-label="メニューを開く" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="main-nav" aria-label="Primary navigation">
        <a href="dashboard.html">ダッシュボード</a>
        <a href="check_in.html">チェックイン</a>
        <a href="slot.html">枠管理</a>
        <a href="holiday_control.html">休業日管理</a>
        <a href="reservation_detail.html">予約一覧</a>
      </nav>
      <div class="header-actions">
        <a class="btn btn-primary btn-header" href="login.html">スタッフログイン</a>
      </div>
    </div>
  </header>

  <main class="admin-shell">
    <aside class="admin-sidebar">
      <p class="admin-sidebar-title">予約管理</p>
      <nav class="admin-sidebar-nav" aria-label="Admin sections">
        <a class="admin-sidebar-link" href="dashboard.html"><span>ダッシュボード</span><small>本日</small></a>
        <a class="admin-sidebar-link" href="check_in.html"><span>チェックイン</span><small>来店</small></a>
        <a class="admin-sidebar-link" href="slot.html"><span>枠管理</span><small>calendar</small></a>
        <a class="admin-sidebar-link" href="holiday_control.html"><span>休業日管理</span><small>close day</small></a>
        <a class="admin-sidebar-link is-active" href="reservation_detail.html"><span>予約一覧</span><small>customer</small></a>
      </nav>
    </aside>

    <section class="admin-content">
      <section class="admin-panel reservation-filter-panel">
        <div class="admin-filter-row">
          <div class="admin-field">
            <label for="reservation-filter-date">日付</label>
            <input id="reservation-filter-date" type="date" />
          </div>
          <div class="admin-field">
            <label for="reservation-filter-name">氏名</label>
            <input id="reservation-filter-name" type="text" placeholder="山田 / Smith" />
          </div>
          <div class="admin-field">
            <label for="reservation-filter-language">言語</label>
            <select id="reservation-filter-language">
              <option value="">すべて</option>
              <option value="ja">日本語</option>
              <option value="en">English</option>
            </select>
          </div>
          <a id="reservation-filter-search" class="btn btn-primary" href="#">検索する</a>
        </div>
      </section>

      <section class="admin-table-card reservation-status-card">
        <div class="admin-section-head">
          <div>
            <p class="admin-kicker">顧客一覧</p>
            <h2>予約詳細テーブル</h2>
          </div>
          <div class="admin-toolbar-group">
            <span id="reservation-total-count" class="admin-badge">0件</span>
            <span id="reservation-status-feedback" class="admin-inline-note">予約データを読み込んでいます。</span>
            <a id="reservation-export" class="btn btn-secondary" href="#">CSV 出力</a>
          </div>
        </div>

        <div class="admin-table-wrap reservation-table-wrap">
          <table class="admin-table reservation-table">
            <thead>
              <tr>
                <th>予約番号</th>
                <th>日付</th>
                <th>時間</th>
                <th>氏名</th>
                <th>人数</th>
                <th>言語</th>
                <th>メール</th>
                <th>電話番号</th>
                <th>現在ステータス</th>
                <th>ステータス変更</th>
                <th>メモ</th>
              </tr>
            </thead>
            <tbody id="reservation-table-body">
              <tr>
                <td class="admin-empty" colspan="11">予約データを読み込んでいます。</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>
  </main>
  <script src="../shared/js/nav.js"></script>
  <script src="../shared/js/reservation_detail.js"></script>
</body>
</html>
